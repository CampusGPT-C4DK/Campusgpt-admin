<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#53ddfc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Graduation Cap Top -->
  <polygon points="50,80 100,40 150,80" fill="url(#capGradient)" stroke="#00bfff" stroke-width="2"/>
  
  <!-- Graduation Cap Front -->
  <polygon points="50,80 75,95 125,95 150,80" fill="url(#capGradient)" stroke="#00bfff" stroke-width="2"/>
  
  <!-- Tassel -->
  <circle cx="100" cy="50" r="4" fill="#53ddfc"/>
  <line x1="100" y1="54" x2="100" y2="75" stroke="#53ddfc" stroke-width="2"/>
  
  <!-- Circuit patterns on cap -->
  <circle cx="75" cy="65" r="3" fill="#53ddfc"/>
  <line x1="75" y1="65" x2="100" y2="65" stroke="#53ddfc" stroke-width="1" opacity="0.6"/>
  
  <circle cx="125" cy="65" r="3" fill="#53ddfc"/>
  <line x1="125" y1="65" x2="100" y2="65" stroke="#53ddfc" stroke-width="1" opacity="0.6"/>
  
  <circle cx="100" cy="75" r="3" fill="#53ddfc"/>
  <line x1="100" y1="75" x2="85" y2="85" stroke="#53ddfc" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="75" x2="115" y2="85" stroke="#53ddfc" stroke-width="1" opacity="0.6"/>
  
  <!-- Circuit board pattern -->
  <rect x="45" y="95" width="110" height="70" fill="url(#capGradient)" stroke="#00bfff" stroke-width="2" rx="5"/>
  
  <!-- Microchip pattern inside -->
  <rect x="60" y="110" width="20" height="20" fill="none" stroke="#53ddfc" stroke-width="1.5"/>
  <rect x="65" y="115" width="10" height="10" fill="#53ddfc" opacity="0.3"/>
  
  <rect x="120" y="110" width="20" height="20" fill="none" stroke="#53ddfc" stroke-width="1.5"/>
  <rect x="125" y="115" width="10" height="10" fill="#53ddfc" opacity="0.3"/>
  
  <rect x="90" y="135" width="20" height="20" fill="none" stroke="#53ddfc" stroke-width="1.5"/>
  <rect x="95" y="140" width="10" height="10" fill="#53ddfc" opacity="0.3"/>
  
  <!-- Connecting lines -->
  <line x1="80" y1="120" x2="100" y2="135" stroke="#53ddfc" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="120" x2="110" y2="135" stroke="#53ddfc" stroke-width="1" opacity="0.5"/>
  
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#53ddfc" stroke-width="1" opacity="0.1" r="95"/>
</svg>